name: astarai
description: "AI Quiz App — Upload PDFs, extract questions via OCR, and generate MCQs with AI."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # File Handling
  file_picker: ^10.0.0
  image_picker: ^1.1.2
  path_provider: ^2.1.2

  # OCR & PDF Parsing
  google_mlkit_text_recognition: ^0.13.0
  syncfusion_flutter_pdf: ^24.2.9

  provider: ^6.1.2

  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2

  # UI & Typography
  google_fonts: ^6.2.1

  # Utilities
  http: ^1.2.0
  shared_preferences: ^2.2.3
  url_launcher: ^6.3.0
  # AI & Notifications
  google_generative_ai: ^0.4.0
  firebase_messaging: ^15.1.3
  intl: ^0.19.0
  youtube_player_flutter: ^9.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/logo.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  assets:
    - assets/
